services:
  # 0. Database (Local Only)
  db:
    image: postgres:15-alpine
    container_name: hidro_fitness_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hidro_fitness
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network

  # 1. Frontend Application (React + Nginx)
  frontend:
    build: .
    container_name: hidro_fitness_frontend
    restart: always
    ports:
      - "3002:80" # Maps port 80 inside container to 3002 on host (Dokploy handles external routing)
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./log/nginx:/var/log/nginx
    networks:
      - app_network

  # 2. Backend API (Node.js + Express)
  backend:
    build: ./backend
    container_name: hidro_fitness_backend
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@db:5432/hidro_fitness}
      - PORT=3001
    volumes:
      - ./log/backend:/app/log
      - ./database/init.sql:/app/init.sql
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

networks:
  app_network:
    external: true
    name: dokploy-network

volumes:
  pgdata:
