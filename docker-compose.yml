version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: hidro_fitness_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: hidro_fitness
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Load init script to create tables and seed data automatically on first startup
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # Database UI (Lightweight alternative to PgAdmin)
  adminer:
    image: adminer
    container_name: hidro_fitness_adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  pgdata:
